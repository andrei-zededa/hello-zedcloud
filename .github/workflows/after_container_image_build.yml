name: After container image is pushed to Dockerhub

on:
  workflow_run:
    workflows: ["Build container image and push to Dockerhub"]
    types: [ "completed" ]

jobs:
  do_thing:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download dockerhub_latest_tag
        uses: dawidd6/action-download-artifact@v8
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          name: dockerhub_image_latest_tag
          path: dockerhub_image_latest_tag
          run_id: ${{ github.event.workflow_run.id }}

      - name: Debug 1
        run: cat dockerhub_image_latest_tag/dockerhub_image_latest_tag

      - name: Debug 2
        run: echo "${{ toJSON(github.event) }}"

